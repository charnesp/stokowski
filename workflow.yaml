# =============================================================================
# Stokowski Test Workflow - Mux Runner Validation
# =============================================================================
# Ce fichier est destiné à tester l'intégration du runner Mux avec Linear.
# 
# PRÉREQUIS:
# Créez un fichier .env à la racine avec:
#   LINEAR_API_KEY="votre_clé_api_linear"
#   ANTHROPIC_AUTH_TOKEN="votre_token_anthropic" (si utilisé)
#   ANTHROPIC_BASE_URL="https://api.anthropic.com" (optionnel)
#
# INSTRUCTIONS:
# 1. Copiez ce fichier vers workflow.yaml
# 2. Remplacez PROJECT_SLUG par votre slug Linear (visible dans l'URL)
# 3. Créez un ticket test dans Linear avec l'état "Todo"
# 4. Lancez: stokowski --dry-run
# 5. Lancez: stokowski
#
# Ce workflow utilise Mux comme runner pour l'état "implement"
# =============================================================================

# ---------------------------------------------------------------------------
# Tracker
# ---------------------------------------------------------------------------
tracker:
  kind: linear
  project_slug: "symphony-test-ebb8e8da5db2"  # Remplacez par votre slug Linear
  # api_key: Définie dans le fichier .env via LINEAR_API_KEY

# ---------------------------------------------------------------------------
# Linear state name mapping
# ---------------------------------------------------------------------------
linear_states:
  todo: "Todo"
  active: "In Progress"
  review: "Human Review"
  gate_approved: "Gate Approved"
  rework: "Rework"
  terminal:
    - Done
    - Closed
    - Cancelled

# ---------------------------------------------------------------------------
# Polling
# ---------------------------------------------------------------------------
polling:
  interval_ms: 30000  # 30 secondes pour les tests

# ---------------------------------------------------------------------------
# Workspace
# ---------------------------------------------------------------------------
workspace:
  root: ~.mux/src/symphony-mux/stokowski-test-workspaces

# ---------------------------------------------------------------------------
# Hooks
# ---------------------------------------------------------------------------
hooks:
  after_create: |
    git clone --depth 1 https://github.com/charnesp/symphony-mux.git .
    echo "Workspace created for test issue"
  before_run: |
    git fetch origin main
    git rebase origin/main 2>/dev/null || git rebase --abort
    echo "Starting Mux runner test..."
  timeout_ms: 60000

# ---------------------------------------------------------------------------
# Claude defaults (reused by Mux runner)
# ---------------------------------------------------------------------------
claude:
  permission_mode: auto
  model: kimi-k2.5:cloud
  max_turns: 5  # Limité pour les tests
  turn_timeout_ms: 600000       # 10 minutes
  stall_timeout_ms: 120000      # 2 minutes

# ---------------------------------------------------------------------------
# Prompts
# ---------------------------------------------------------------------------
prompts:
  lifecycle_prompt: prompts/lifecycle.md  # Required lifecycle template

# ---------------------------------------------------------------------------
# State machine - Test avec runner Mux
# ---------------------------------------------------------------------------
states:

  # Test state using Mux runner
  test-claude:
    type: agent
    runner: claude
    prompt: "prompts/test-claude.md"
    linear_state: active
    model: kimi-k2.5:cloud
    max_turns: 3
    transitions:
      complete: done

  # Terminal state
  done:
    type: terminal
    linear_state: terminal
