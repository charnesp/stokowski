                          local on load)
                      aiSettings:
                        type: object
                        properties:
                          model:
                            type: string
                            description: Canonical model id in the form "provider:model"
                          thinkingLevel:
                            enum:
                              - off
                              - low
                              - medium
                              - high
                              - xhigh
                              - max
