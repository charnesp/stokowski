          application/json:
            schema:
              type: object
              properties:
                workspaceId:
                  type: string
                agentId:
                  type: string
                  minLength: 1
                  maxLength: 64
                  pattern: ^[a-z0-9]+(?:[a-z0-9_-]*[a-z0-9])?$
                aiSettings:
                  type: object
                  properties:
                    model:
                      type: string
                      description: Canonical model id in the form "provider:model"
                    thinkingLevel:
                      enum:
                        - off
                        - low
                        - medium
                        - high
                        - xhigh
                        - max
                      description: Thinking/reasoning effort level
                  required:
                    - model
                    - thinkingLevel
              required:
                - workspaceId
                - agentId
                - aiSettings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      data:
                        not: {}
                    required:
                      - success
                  - type: object
                    properties:
                      success:
                        const: false
                      error:
