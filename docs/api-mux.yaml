                          - medium
                          - high
                          - xhigh
                          - max
                      enabled:
                        type: boolean
              required:
                - agentAiDefaults
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - not: {}
                  - not: {}
  /config/updateMuxGatewayPrefs:
    post:
      operationId: config.updateMuxGatewayPrefs
      requestBody:
        required: true
