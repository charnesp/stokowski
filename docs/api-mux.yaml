        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                propertyNames:
                  type: string
                additionalProperties:
                  type: object
                  properties:
                    recency:
                      type: number
                      description: Unix ms timestamp of last user interaction
                    streaming:
                      type: boolean
                      description: Whether workspace currently has an active stream
                    streamingGeneration:
                      type: number
                      description: Monotonic stream generation counter for distinguishing newer
                        background turns
                    lastModel:
                      anyOf:
                        - type: string
                        - type: "null"
                      description: Last model sent from this workspace
                    lastThinkingLevel:
                      anyOf:
                        - enum:
                            - off
                            - low
                            - medium
                            - high
                            - xhigh
                            - max
                        - type: "null"
                      description: Last thinking/reasoning level used in this workspace
                    displayStatus:
                      anyOf:
                        - type: object
                          properties:
                            emoji:
                              type: string
                            message:
                              type: string
                            url:
                              type: string
                          required:
                            - emoji
                            - message
                        - type: "null"
                      description: Transient non-todo status for system-driven background progress
                        (for example executor routing).
                    todoStatus:
                      anyOf:
                        - type: object
                          properties:
                            emoji:
                              type: string
                            message:
                              type: string
                            url:
                              type: string
                          required:
                            - emoji
                            - message
                        - type: "null"
                      description: Status derived from the current todo list (preferred background
                        progress surface in the sidebar).
                    hasTodos:
                      type: boolean
                      description: Whether the workspace still had todos when streaming last stopped
                    isIdleCompaction:
                      type: boolean
                      description: Whether the current streaming activity is an idle (background)
                        compaction
                  required:
                    - recency
                    - streaming
                    - lastModel
                    - lastThinkingLevel
