                - muxGatewayEnabled
                - muxGatewayModels
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - not: {}
                  - not: {}
  /config/updateRoutePreferences:
    post:
      operationId: config.updateRoutePreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                routePriority:
                  type: array
                  items:
                    type: string
                routeOverrides:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties:
                    type: string
              required:
                - routePriority
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - not: {}
                  - not: {}
  /config/updateModelPreferences:
    post:
      operationId: config.updateModelPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                defaultModel:
                  type: string
                hiddenModels:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - not: {}
                  - not: {}
  /config/updateCoderPrefs:
    post:
      operationId: config.updateCoderPrefs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stopCoderWorkspaceOnArchive:
                  type: boolean
              required:
                - stopCoderWorkspaceOnArchive
              additionalProperties: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - not: {}
                  - not: {}
  /config/updateOnePasswordAccountName:
    post:
      operationId: config.updateOnePasswordAccountName
      requestBody:
        required: true
        content:
          application/json:
