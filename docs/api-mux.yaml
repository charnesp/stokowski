                                thinkingLevel:
                                  enum:
                                    - off
                                    - low
                                    - medium
                                    - high
                                    - xhigh
                                    - max
                                  description: Thinking/reasoning effort level
                              required:
                                - model
                                - thinkingLevel
                            description: Per-agent AI settings persisted in config
                          runtimeConfig:
                            anyOf:
                              - type: object
                                properties:
                                  type:
                                    const: local
                                  srcBaseDir:
                                    type: string
                                    description: Base directory where all workspaces are stored (legacy worktree
                                      config)
                                  bgOutputDir:
                                    type: string
                                    description: Directory for background process output (e.g., /tmp/mux-bashes)
                                required:
                                  - type
                                  - srcBaseDir
                              - type: object
                                properties:
                                  type:
                                    const: local
                                  bgOutputDir:
                                    type: string
                                    description: Directory for background process output (e.g., /tmp/mux-bashes)
                                required:
                                  - type
                              - type: object
                                properties:
                                  type:
                                    const: worktree
                                  srcBaseDir:
                                    type: string
                                    description: Base directory where all workspaces are stored (e.g., ~/.mux/src)
                                  bgOutputDir:
                                    type: string
                                    description: Directory for background process output (e.g., /tmp/mux-bashes)
                                required:
                                  - type
                                  - srcBaseDir
                              - type: object
                                properties:
                                  type:
                                    const: ssh
                                  host:
                                    type: string
                                    description: SSH host (can be hostname, user@host, or SSH config alias)
                                  srcBaseDir:
                                    type: string
                                    description: Base directory on remote host where all workspaces are stored
                                  bgOutputDir:
                                    type: string
                                    description: Directory for background process output (e.g., /tmp/mux-bashes)
                                  identityFile:
                                    type: string
                                    description: Path to SSH private key (if not using ~/.ssh/config or ssh-agent)
                                  port:
                                    type: number
                                    description: "SSH port (default: 22)"
                                  coder:
                                    type: object
                                    properties:
                                      workspaceName:
                                        type: string
                                        description: Coder workspace name
                                      template:
                                        type: string
                                        description: Template used to create workspace
                                      templateOrg:
                                        type: string
                                        description: Template organization (for disambiguation when templates have same
                                          name)
                                      preset:
                                        type: string
                                        description: Preset used during creation
                                      existingWorkspace:
                                        type: boolean
                                        description: True if connected to pre-existing Coder workspace
                                    description: Coder workspace configuration (when using Coder as SSH backend)
                                required:
                                  - type
                                  - host
                                  - srcBaseDir
                              - type: object
                                properties:
                                  type:
                                    const: docker
                                  image:
                                    type: string
                                    description: Docker image to use (e.g., node:20)
                                  containerName:
                                    type: string
                                    description: Container name (populated after workspace creation)
                                  shareCredentials:
                                    type: boolean
                                    description: Forward SSH agent and mount ~/.gitconfig read-only
                                required:
                                  - type
                                  - image
                              - type: object
                                properties:
                                  type:
                                    const: devcontainer
                                  configPath:
                                    type: string
                                    description: Path to devcontainer.json (relative to project root)
                                  shareCredentials:
                                    type: boolean
                                    description: Forward SSH agent and mount ~/.gitconfig read-only
                                required:
                                  - type
                                  - configPath
                            description: Runtime configuration for this workspace (always set, defaults to
                              local on load)
                          aiSettings:
                            type: object
                            properties:
                              model:
                                type: string
                                description: Canonical model id in the form "provider:model"
                              thinkingLevel:
                                enum:
                                  - off
                                  - low
                                  - medium
                                  - high
                                  - xhigh
                                  - max
                                description: Thinking/reasoning effort level
                            required:
                              - model
                              - thinkingLevel
                            description: Workspace-scoped AI settings (model + thinking level) persisted in
                              config
                          parentWorkspaceId:
                            type: string
                            description: If set, this workspace is a child workspace spawned from the parent
                              workspaceId (enables nesting in UI and backend
                              orchestration).
                          agentType:
                            type: string
                            description: If set, selects an agent preset for this workspace (e.g., "explore"
                              or "exec").
                          agentId:
                            type: string
                            description: If set, selects an agent definition for this workspace (e.g.,
                              "explore" or "exec").
                          bestOf:
                            type: object
                            properties:
                              groupId:
                                type: string
                                description: Stable identifier shared by sibling task workspaces spawned from
                                  the same grouped task request.
                              index:
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                                description: Zero-based sibling index within the grouped task request.
                              total:
                                type: integer
                                minimum: 2
                                maximum: 9007199254740991
                                description: Total number of sibling tasks spawned in the grouped task request.
                              kind:
                                enum:
                                  - bestOf
                                  - variants
                                description: Optional grouped task mode ("bestOf" for repeated candidates or
                                  "variants" for labeled siblings). Missing
                                  values default to "bestOf" at read time for
                                  backward compatibility.
                              label:
                                type: string
                                minLength: 1
                                description: Optional per-sibling label for grouped task variants.
                            required:
                              - groupId
                              - index
                              - total
                            description: Grouping metadata for child tasks spawned from the same parent tool
                              call.
                          taskStatus:
                            enum:
                              - queued
                              - running
                              - awaiting_report
                              - interrupted
                              - reported
                            description: Agent task lifecycle status for child workspaces
                              (queued|running|awaiting_report|interrupted|reported).
                          reportedAt:
                            type: string
                            description: ISO 8601 timestamp for when an agent task reported completion
                              (optional).
                          taskModelString:
                            type: string
                            description: Model string used to run this agent task (used for restart-safe
                              resumptions).
                          taskThinkingLevel:
                            enum:
                              - off
                              - low
                              - medium
                              - high
                              - xhigh
                              - max
                            description: Thinking level used for this agent task (used for restart-safe
                              resumptions).
                          taskPrompt:
                            type: string
                            description: Initial prompt for a queued agent task (persisted only until the
                              task actually starts).
                          taskBaseCommitSha:
                            type: string
                            description: Git commit SHA this agent task workspace started from (used for
                              generating git-format-patch artifacts).
                          taskBaseCommitShaByProjectPath:
                            type: object
                            propertyNames:
                              type: string
                            additionalProperties:
                              type: string
                            description: Per-project git HEAD SHAs captured when an agent task workspace
                              starts (used for multi-project git-format-patch
                              artifacts).
                          taskTrunkBranch:
                            type: string
                            description: Trunk branch used to create/init this agent task workspace (used
                              for restart-safe init on queued tasks).
                          archivedAt:
                            type: string
                            description: ISO 8601 timestamp when workspace was last archived. Workspace is
                              considered archived if archivedAt > unarchivedAt
                              (or unarchivedAt is absent).
                          unarchivedAt:
                            type: string
                            description: ISO 8601 timestamp when workspace was last unarchived. Used for
                              recency calculation to bump restored workspaces to
                              top.
                          projects:
                            type: array
                            items:
                              type: object
                              properties:
                                projectPath:
                                  type: string
                                  description: Absolute path to the project's main git repo
                                projectName:
                                  type: string
                                  description: Display name for the project (typically derived from projectPath)
                              required:
                                - projectPath
                                - projectName
                            description: "For multi-project workspaces: list of included projects. When >1
                              entry, this is a multi-project workspace.
                              projectPath/projectName reflect the primary
                              project for backcompat."
                          sectionId:
                            type: string
                            description: ID of the section this workspace belongs to (optional, unsectioned
                              if absent)
                          namedWorkspacePath:
                            type: string
                            description: Worktree path (uses workspace name as directory)
                          incompatibleRuntime:
                            type: string
                            description: If set, this workspace has an incompatible runtime configuration
                              (e.g., from a newer version of mux). The workspace
                              should be displayed but interactions should show
                              this error message.
                          isRemoving:
                            type: boolean
                            description: True if this workspace is currently being deleted (deletion in
                              progress).
                          isInitializing:
                            type: boolean
                            description: True if this workspace is currently initializing (postCreateSetup
                              or initWorkspace running).
                        required:
                          - id
                          - name
                          - projectName
                          - projectPath
                          - runtimeConfig
                          - namedWorkspacePath
                      projectPath:
                        type: string
                    required:
                      - success
                      - metadata
                      - projectPath
                  - type: object
                    properties:
                      success:
                        const: false
                      error:
                        type: string
                    required:
                      - success
                      - error
  /workspace/sendMessage:
    post:
      operationId: workspace.sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspaceId:
                  type: string
                message:
                  type: string
                options:
                  type: object
                  properties:
                    editMessageId:
                      type: string
                    thinkingLevel:
                      enum:
                        - off
                        - low
                        - medium
                        - high
                        - xhigh
                        - max
                    model:
                      type: string
                    system1ThinkingLevel:
                      enum:
                        - off
                        - low
                        - medium
                        - high
                        - xhigh
                        - max
                    system1Model:
                      type: string
                    toolPolicy:
                      type: array
                      items:
                        type: object
                        properties:
                          regex_match:
                            type: string
                            description: Regex pattern to match tool names (e.g., "bash", "file_edit_.*",
                              ".*")
                          action:
                            enum:
                              - enable
                              - disable
                              - require
                            description: Action to take when pattern matches
                        required:
                          - regex_match
                          - action
                      description: Tool policy - array of filters applied in order. Default behavior
                        is allow all tools.
                    additionalSystemInstructions:
                      type: string
                    maxOutputTokens:
                      type: number
                    agentId:
                      type: string
                      minLength: 1
                      maxLength: 64
                      pattern: ^[a-z0-9]+(?:[a-z0-9_-]*[a-z0-9])?$
                      description: Agent id for this request
                    mode:
                      enum:
                        - plan
                        - exec
                        - compact
                      description: Legacy base mode (plan/exec/compact) for backend fallback
                    providerOptions:
                      type: object
                      properties:
                        anthropic:
                          type: object
                          properties:
                            use1MContext:
                              type: boolean
                              description: "Enable Anthropic's beta 1M context window globally (deprecated:
                                use use1MContextModels)"
                            use1MContextModels:
                              type: array
                              items:
                                type: string
                              description: Model IDs with Anthropic beta 1M enabled (e.g.
                                ['anthropic:claude-sonnet-4-20250514'])
                            cacheTtl:
                              anyOf:
                                - enum:
                                    - 5m
                                    - 1h
                                - type: "null"
                              description: 'Anthropic prompt cache TTL: "5m" (default, free refresh) or "1h"
                                (2× write cost, longer cache)'
                            disableBetaFeatures:
                              type: boolean
                              description: Disable Anthropic beta features (beta 1M context for older Sonnet
                                models, prompt caching). Required for ZDR.
                        openai:
                          type: object
                          properties:
                            serviceTier:
                              enum:
                                - auto
                                - default
                                - flex
                                - priority
                              description: "OpenAI service tier: priority (low-latency), flex (50% cheaper,
                                higher latency), auto/default (standard)"
                            wireFormat:
                              enum:
                                - responses
                                - chatCompletions
                              description: "OpenAI wire format: responses (default, persistence + built-in
                                tools) or chatCompletions (legacy
                                /chat/completions)"
                            store:
                              type: boolean
                              description: Whether OpenAI stores responses. Set false for zero data retention
                                (ZDR).
                            forceContextLimitError:
                              type: boolean
                              description: Force context limit error (used in integration tests to simulate
                                overflow)
                            simulateToolPolicyNoop:
                              type: boolean
                              description: Simulate successful response without executing tools (used in tool
                                policy tests)
                        google:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties: {}
                        ollama:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties: {}
                        openrouter:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties: {}
                        xai:
                          type: object
                          properties:
                            searchParameters:
                              type: object
                              properties:
                                mode:
                                  enum:
                                    - auto
                                    - off
                                    - on
                                returnCitations:
                                  type: boolean
                                fromDate:
                                  type: string
                                toDate:
                                  type: string
                                maxSearchResults:
                                  type: number
                                sources:
                                  type: array
                                  items:
                                    anyOf:
                                      - type: object
                                        properties:
                                          type:
                                            const: web
                                          country:
                                            type: string
                                          excludedWebsites:
                                            type: array
                                            items:
                                              type: string
                                          allowedWebsites:
                                            type: array
                                            items:
                                              type: string
                                          safeSearch:
                                            type: boolean
                                        required:
                                          - type
                                      - type: object
                                        properties:
                                          type:
                                            const: x
                                          excludedXHandles:
                                            type: array
                                            items:
                                              type: string
                                          includedXHandles:
                                            type: array
                                            items:
                                              type: string
                                          postFavoriteCount:
                                            type: number
                                          postViewCount:
                                            type: number
                                          xHandles:
                                            type: array
                                            items:
                                              type: string
                                        required:
                                          - type
                                      - type: object
                                        properties:
                                          type:
                                            const: news
                                          country:
                                            type: string
                                          excludedWebsites:
                                            type: array
                                            items:
                                              type: string
                                          safeSearch:
                                            type: boolean
                                        required:
                                          - type
                                      - type: object
                                        properties:
                                          type:
                                            const: rss
                                          links:
                                            type: array
                                            items:
                                              type: string
                                        required:
                                          - type
                                          - links
                              required:
                                - mode
                    acpPromptId:
                      type: string
                      description: ACP prompt correlation id for terminal stream matching
                    delegatedToolNames:
                      type: array
                      items:
                        type: string
                      description: Tool names delegated back to ACP clients for this request
                    muxMetadata: {}
                    skipAiSettingsPersistence:
                      type: boolean
                    experiments:
                      type: object
                      properties:
                        programmaticToolCalling:
                          type: boolean
                        programmaticToolCallingExclusive:
                          type: boolean
                        system1:
                          type: boolean
                        execSubagentHardRestart:
                          type: boolean
                    disableWorkspaceAgents:
                      type: boolean
                    queueDispatchMode:
                      anyOf:
                        - enum:
                            - tool-end
                            - turn-end
                        - type: "null"
                    fileParts:
                      type: array
                      items:
                        type: object
                        properties:
                          url:
                            type: string
                          mediaType:
                            type: string
                          filename:
                            type: string
                        required:
                          - url
                          - mediaType
                  required:
                    - model
                    - agentId
              required:
                - workspaceId
                - message
                - options
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    properties:
                      success:
                        const: true
                      data:
                        type: object
                    required:
                      - success
                      - data
                  - type: object
                    properties:
                      success:
                        const: false
                      error:
                        anyOf:
                          - type: object
                            properties:
                              type:
                                const: api_key_not_found
                              provider:
                                type: string
                            required:
                              - type
                              - provider
                          - type: object
                            properties:
                              type:
                                const: oauth_not_connected
                              provider:
                                type: string
                            required:
                              - type
                              - provider
                          - type: object
                            properties:
                              type:
                                const: provider_disabled
                              provider:
                                type: string
                            required:
                              - type
                              - provider
                          - type: object
                            properties:
                              type:
                                const: provider_not_supported
                              provider:
                                type: string
                            required:
                              - type
                              - provider
                          - type: object
                            properties:
                              type:
                                const: invalid_model_string
                              message:
                                type: string
                            required:
                              - type
                              - message
                          - type: object
                            properties:
                              type:
                                const: incompatible_workspace
                              message:
                                type: string
                            required:
                              - type
                              - message
                          - type: object
                            properties:
                              type:
                                const: runtime_not_ready
                              message:
                                type: string
                            required:
                              - type
                              - message
                          - type: object
                            properties:
                              type:
                                const: runtime_start_failed
                              message:
                                type: string
                            required:
                              - type
                              - message
                          - type: object
                            properties:
                              type:
                                const: policy_denied
                              message:
                                type: string
                            required:
                              - type
                              - message
                          - type: object
                            properties:
                              type:
                                const: unknown
                              raw:
                                type: string
                            required:
                              - type
                              - raw
                    required:
                      - success
                      - error
