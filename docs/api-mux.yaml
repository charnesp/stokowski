                          config
                      parentWorkspaceId:
                        type: string
                        description: If set, this workspace is a child workspace spawned from the parent
                          workspaceId (enables nesting in UI and backend
                          orchestration).
                      agentType:
                        type: string
                        description: If set, selects an agent preset for this workspace (e.g., "explore"
                          or "exec").
                      agentId:
                        type: string
                        description: If set, selects an agent definition for this workspace (e.g.,
                          "explore" or "exec").
                      bestOf:
                        type: object
                        properties:
                          groupId:
                            type: string
                            description: Stable identifier shared by sibling task workspaces spawned from
                              the same grouped task request.
                          index:
                            type: integer
                            minimum: 0
                            maximum: 9007199254740991
                            description: Zero-based sibling index within the grouped task request.
                          total:
                            type: integer
                            minimum: 2
                            maximum: 9007199254740991
                            description: Total number of sibling tasks spawned in the grouped task request.
                          kind:
                            enum:
                              - bestOf
                              - variants
                            description: Optional grouped task mode ("bestOf" for repeated candidates or
                              "variants" for labeled siblings). Missing values
                              default to "bestOf" at read time for backward
                              compatibility.
                          label:
                            type: string
                            minLength: 1
                            description: Optional per-sibling label for grouped task variants.
                        required:
                          - groupId
                          - index
                          - total
                        description: Grouping metadata for child tasks spawned from the same parent tool
                          call.
                      taskStatus:
                        enum:
                          - queued
                          - running
                          - awaiting_report
                          - interrupted
                          - reported
                        description: Agent task lifecycle status for child workspaces
                          (queued|running|awaiting_report|interrupted|reported).
                      reportedAt:
                        type: string
                        description: ISO 8601 timestamp for when an agent task reported completion
                          (optional).
                      taskModelString:
                        type: string
                        description: Model string used to run this agent task (used for restart-safe
                          resumptions).
                      taskThinkingLevel:
                        enum:
                          - off
                          - low
                          - medium
                          - high
                          - xhigh
                          - max
                        description: Thinking level used for this agent task (used for restart-safe
                          resumptions).
                      taskPrompt:
                        type: string
                        description: Initial prompt for a queued agent task (persisted only until the
                          task actually starts).
                      taskBaseCommitSha:
                        type: string
                        description: Git commit SHA this agent task workspace started from (used for
                          generating git-format-patch artifacts).
                      taskBaseCommitShaByProjectPath:
                        type: object
                        propertyNames:
                          type: string
                        additionalProperties:
                          type: string
                        description: Per-project git HEAD SHAs captured when an agent task workspace
                          starts (used for multi-project git-format-patch
                          artifacts).
                      taskTrunkBranch:
                        type: string
                        description: Trunk branch used to create/init this agent task workspace (used
                          for restart-safe init on queued tasks).
                      archivedAt:
                        type: string
                        description: ISO 8601 timestamp when workspace was last archived. Workspace is
                          considered archived if archivedAt > unarchivedAt (or
                          unarchivedAt is absent).
