info:
  title: Mux API
  version: v0.22.0
  description: API for Mux
servers:
  - url: /api
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
openapi: 3.1.1
paths:
  /tokenizer/countTokens:
    post:
      operationId: tokenizer.countTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                text:
                  type: string
              required:
                - model
                - text
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: number
  /tokenizer/countTokensBatch:
    post:
      operationId: tokenizer.countTokensBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                texts:
                  type: array
                  items:
                    type: string
              required:
                - model
                - texts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: number
  /tokenizer/calculateStats:
    post:
      operationId: tokenizer.calculateStats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspaceId:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      role:
                        enum:
                          - system
                          - user
                          - assistant
                      parts:
                        type: array
                        items:
                          anyOf:
                            - type: object
                              properties:
                                type:
                                  const: text
                                text:
                                  type: string
                                timestamp:
                                  type: number
                              required:
                                - type
                                - text
                            - type: object
                              properties:
                                type:
                                  const: reasoning
                                text:
                                  type: string
                                timestamp:
                                  type: number
                              required:
                                - type
                                - text
                            - anyOf:
                                - type: object
                                  properties:
                                    type:
                                      const: dynamic-tool
                                    toolCallId:
                                      type: string
                                    toolName:
                                      type: string
                                    input: {}
                                    timestamp:
                                      type: number
                                    state:
                                      const: output-available
                                    output: {}
                                    nestedCalls:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          toolCallId:
                                            type: string
                                          toolName:
                                            type: string
                                          input: {}
                                          output: {}
                                          state:
                                            enum:
                                              - input-available
                                              - output-available
                                              - output-redacted
                                          failed:
                                            type: boolean
                                          timestamp:
                                            type: number
                                        required:
                                          - toolCallId
                                          - toolName
                                          - state
                                  required:
                                    - type
                                    - toolCallId
                                    - toolName
                                    - state
                                - type: object
                                  properties:
                                    type:
                                      const: dynamic-tool
                                    toolCallId:
                                      type: string
                                    toolName:
                                      type: string
                                    input: {}
                                    timestamp:
                                      type: number
                                    state:
                                      const: input-available
                                    nestedCalls:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          toolCallId:
                                            type: string
                                          toolName:
                                            type: string
                                          input: {}
                                          output: {}
                                          state:
                                            enum:
                                              - input-available
                                              - output-available
                                              - output-redacted
                                          failed:
                                            type: boolean
                                          timestamp:
                                            type: number
                                        required:
                                          - toolCallId
                                          - toolName
                                          - state
                                  required:
                                    - type
                                    - toolCallId
                                    - toolName
                                    - state
                                - type: object
                                  properties:
                                    type:
                                      const: dynamic-tool
                                    toolCallId:
                                      type: string
                                    toolName:
                                      type: string
                                    input: {}
                                    timestamp:
                                      type: number
                                    state:
                                      const: output-redacted
                                    failed:
                                      type: boolean
                                    nestedCalls:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          toolCallId:
                                            type: string
                                          toolName:
                                            type: string
                                          input: {}
                                          output: {}
                                          state:
                                            enum:
                                              - input-available
                                              - output-available
                                              - output-redacted
                                          failed:
                                            type: boolean
                                          timestamp:
                                            type: number
                                        required:
                                          - toolCallId
                                          - toolName
                                          - state
                                  required:
                                    - type
                                    - toolCallId
                                    - toolName
                                    - state
                            - type: object
                              properties:
                                url:
                                  type: string
                                mediaType:
                                  type: string
                                filename:
                                  type: string
                                type:
                                  const: file
                              required:
                                - url
                                - mediaType
                                - type
                      createdAt:
                        type: string
                        format: date-time
                        x-native-type: date
                      metadata:
                        type: object
                        properties:
                          historySequence:
                            type: number
                          timestamp:
                            type: number
                          model:
                            type: string
                          metadataModel:
                            type: string
                          thinkingLevel:
                            enum:
                              - off
                              - low
                              - medium
                              - high
                              - xhigh
                              - max
                          routedThroughGateway:
                            type: boolean
                          routeProvider:
                            type: string
                          usage: {}
                          contextUsage: {}
                          providerMetadata:
                            type: object
                            propertyNames:
                              type: string
                            additionalProperties: {}
                          contextProviderMetadata:
                            type: object
                            propertyNames:
                              type: string
                            additionalProperties: {}
                          duration:
                            type: number
                          ttftMs:
                            type: number
                          systemMessageTokens:
                            type: number
                          muxMetadata: {}
                          cmuxMetadata: {}
                          acpPromptId:
                            type: string
                          compacted:
                            anyOf:
                              - const: user
                              - const: idle
                              - type: boolean
                          compactionEpoch: {}
                          compactionBoundary:
                            type: boolean
                          toolPolicy: {}
                          disableWorkspaceAgents:
                            type: boolean
                          retrySendOptions: {}
                          agentId:
                            type: string
                            minLength: 1
                            maxLength: 64
                            pattern: ^[a-z0-9]+(?:[a-z0-9_-]*[a-z0-9])?$
                          partial:
                            type: boolean
                          synthetic:
                            type: boolean
                          uiVisible:
                            type: boolean
                          agentSkillSnapshot:
                            type: object
                            properties:
                              skillName:
                                type: string
                                minLength: 1
                                maxLength: 64
                                pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
                              scope:
                                enum:
                                  - project
                                  - global
                                  - built-in
                              sha256:
                                type: string
                              frontmatterYaml:
                                type: string
                            required:
                              - skillName
                              - scope
                              - sha256
                          error:
                            type: string
                          errorType:
                            enum:
                              - authentication
                              - rate_limit
                              - server_error
                              - api
                              - retry_failed
                              - aborted
                              - network
                              - context_exceeded
                              - quota
                              - model_not_found
                              - runtime_not_ready
                              - runtime_start_failed
                              - empty_output
                              - unknown
                    required:
                      - id
                      - role
                      - parts
                model:
                  type: string
              required:
                - workspaceId
                - messages
                - model
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  consumers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: '"User", "Assistant", "bash", "readFile", etc.'
                        tokens:
                          type: number
                          description: Total token count for this consumer
                        percentage:
                          type: number
                          description: "% of total tokens"
                        fixedTokens:
                          type: number
                          description: Fixed overhead (e.g., tool definitions)
                        variableTokens:
                          type: number
                          description: Variable usage (e.g., actual tool calls, text)
                      required:
                        - name
                        - tokens
                        - percentage
                    description: Sorted descending by token count
                  totalTokens:
                    type: number
                  model:
                    type: string
                  tokenizerName:
                    type: string
                    description: e.g., "o200k_base", "claude"
                  usageHistory:
                    type: array
                    items:
                      type: object
                      properties:
                        input:
                          type: object
                          properties:
                            tokens:
                              type: number
                            cost_usd:
                              type: number
                          required:
                            - tokens
                        cached:
                          type: object
                          properties:
                            tokens:
                              type: number
                            cost_usd:
                              type: number
                          required:
                            - tokens
                        cacheCreate:
                          type: object
                          properties:
                            tokens:
                              type: number
                            cost_usd:
                              type: number
                          required:
                            - tokens
                        output:
                          type: object
                          properties:
                            tokens:
                              type: number
                            cost_usd:
                              type: number
                          required:
                            - tokens
                        reasoning:
                          type: object
                          properties:
                            tokens:
                              type: number
                            cost_usd:
                              type: number
                          required:
                            - tokens
                        model:
                          type: string
                        costsIncluded:
                          type: boolean
                      required:
                        - input
                        - cached
                        - cacheCreate
                        - output
                        - reasoning
                    description: Ordered array of actual usage statistics from API responses
                  topFilePaths:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                          description: File path (relative or absolute)
                        tokens:
                          type: number
                          description: Token count for this file
                      required:
                        - path
                        - tokens
                    description: Top 10 files by token count aggregated across all file tools
                required:
                  - consumers
                  - totalTokens
                  - model
                  - tokenizerName
                  - usageHistory
  /splashScreens/getViewedSplashScreens:
    post:
      operationId: splashScreens.getViewedSplashScreens
      requestBody:
        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /splashScreens/markSplashScreenViewed:
    post:
      operationId: splashScreens.markSplashScreenViewed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                splashId:
                  type: string
              required:
                - splashId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - not: {}
                  - not: {}
  /server/getLaunchProject:
    post:
      operationId: server.getLaunchProject
      requestBody:
        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - type: string
                  - type: "null"
  /server/getSshHost:
    post:
      operationId: server.getSshHost
      requestBody:
        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - type: string
                  - type: "null"
  /server/setSshHost:
    post:
      operationId: server.setSshHost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sshHost:
                  anyOf:
                    - type: string
                    - type: "null"
              required:
                - sshHost
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - not: {}
                  - not: {}
  /server/getApiServerStatus:
    post:
      operationId: server.getApiServerStatus
      requestBody:
        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  running:
                    type: boolean
                  baseUrl:
                    anyOf:
                      - type: string
                      - type: "null"
                  bindHost:
                    anyOf:
                      - type: string
                      - type: "null"
                  port:
                    anyOf:
                      - type: integer
                        minimum: 0
                        maximum: 65535
                      - type: "null"
                  networkBaseUrls:
                    type: array
                    items:
                      type: string
                      format: uri
                  token:
                    anyOf:
                      - type: string
                      - type: "null"
                  configuredBindHost:
                    anyOf:
                      - type: string
                      - type: "null"
                  configuredPort:
                    anyOf:
                      - type: integer
                        minimum: 0
                        maximum: 65535
                      - type: "null"
                  configuredServeWebUi:
                    type: boolean
                required:
                  - running
                  - baseUrl
                  - bindHost
                  - port
                  - networkBaseUrls
                  - token
                  - configuredBindHost
                  - configuredPort
                  - configuredServeWebUi
  /server/setApiServerSettings:
    post:
      operationId: server.setApiServerSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bindHost:
                  anyOf:
                    - type: string
                    - type: "null"
                port:
                  anyOf:
                    - type: integer
                      minimum: 0
                      maximum: 65535
                    - type: "null"
                serveWebUi:
                  anyOf:
                    - type: boolean
                    - type: "null"
              required:
                - bindHost
                - port
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  running:
                    type: boolean
                  baseUrl:
                    anyOf:
                      - type: string
                      - type: "null"
                  bindHost:
                    anyOf:
                      - type: string
                      - type: "null"
                  port:
                    anyOf:
                      - type: integer
                        minimum: 0
                        maximum: 65535
                      - type: "null"
                  networkBaseUrls:
                    type: array
                    items:
                      type: string
                      format: uri
                  token:
                    anyOf:
                      - type: string
                      - type: "null"
                  configuredBindHost:
                    anyOf:
                      - type: string
                      - type: "null"
                  configuredPort:
                    anyOf:
                      - type: integer
                        minimum: 0
                        maximum: 65535
                      - type: "null"
                  configuredServeWebUi:
                    type: boolean
                required:
                  - running
                  - baseUrl
                  - bindHost
                  - port
                  - networkBaseUrls
                  - token
                  - configuredBindHost
                  - configuredPort
                  - configuredServeWebUi
  /serverAuth/listSessions:
    post:
      operationId: serverAuth.listSessions
      requestBody:
        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    label:
                      type: string
                    createdAtMs:
                      type: integer
                      minimum: 0
                      maximum: 9007199254740991
                    lastUsedAtMs:
                      type: integer
                      minimum: 0
                      maximum: 9007199254740991
                    isCurrent:
                      type: boolean
                  required:
                    - id
                    - label
                    - createdAtMs
                    - lastUsedAtMs
                    - isCurrent
  /serverAuth/revokeSession:
    post:
      operationId: serverAuth.revokeSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
              required:
                - sessionId
              additionalProperties: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
                required:
                  - removed
  /serverAuth/revokeOtherSessions:
    post:
      operationId: serverAuth.revokeOtherSessions
      requestBody:
        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  revokedCount:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                required:
                  - revokedCount
  /config/getConfig:
    post:
      operationId: config.getConfig
      requestBody:
        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskSettings:
                    type: object
                    properties:
                      maxParallelAgentTasks:
                        type: integer
                        minimum: 1
                        maximum: 256
                      maxTaskNestingDepth:
                        type: integer
                        minimum: 1
                        maximum: 5
                      proposePlanImplementReplacesChatHistory:
                        type: boolean
                      planSubagentExecutorRouting:
                        enum:
                          - exec
                          - orchestrator
                          - auto
                      planSubagentDefaultsToOrchestrator:
                        type: boolean
                      bashOutputCompactionMinLines:
                        type: integer
                        minimum: 0
                        maximum: 1000
                      bashOutputCompactionMinTotalBytes:
                        type: integer
                        minimum: 0
                        maximum: 16384
                      bashOutputCompactionMaxKeptLines:
                        type: integer
                        minimum: 1
                        maximum: 1000
                      bashOutputCompactionTimeoutMs:
                        type: integer
                        minimum: 1000
                        maximum: 120000
                      bashOutputCompactionHeuristicFallback:
                        type: boolean
                    required:
                      - maxParallelAgentTasks
                      - maxTaskNestingDepth
                  muxGatewayEnabled:
                    type: boolean
                  muxGatewayModels:
                    type: array
                    items:
                      type: string
                  routePriority:
                    type: array
                    items:
                      type: string
                  routeOverrides:
                    type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: string
                  defaultModel:
                    type: string
                  hiddenModels:
                    type: array
                    items:
                      type: string
                  stopCoderWorkspaceOnArchive:
                    type: boolean
                  runtimeEnablement:
                    type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: boolean
                  defaultRuntime:
                    anyOf:
                      - type: string
                      - type: "null"
                  agentAiDefaults:
                    type: object
                    propertyNames:
                      type: string
                      minLength: 1
                      maxLength: 64
                      pattern: ^[a-z0-9]+(?:[a-z0-9_-]*[a-z0-9])?$
                    additionalProperties:
                      type: object
                      properties:
                        modelString:
                          type: string
                        thinkingLevel:
                          enum:
                            - off
                            - low
                            - medium
                            - high
                            - xhigh
                            - max
                        enabled:
                          type: boolean
                  subagentAiDefaults:
                    type: object
                    propertyNames:
                      type: string
                      minLength: 1
                      maxLength: 64
                      pattern: ^[a-z0-9]+(?:[a-z0-9_-]*[a-z0-9])?$
                    additionalProperties:
                      type: object
                      properties:
                        modelString:
                          type: string
                        thinkingLevel:
                          enum:
                            - off
                            - low
                            - medium
                            - high
                            - xhigh
                            - max
                  muxGovernorUrl:
                    anyOf:
                      - type: string
                      - type: "null"
                  muxGovernorEnrolled:
                    type: boolean
                  llmDebugLogs:
                    type: boolean
                  onePasswordAccountName:
                    anyOf:
                      - type: string
                      - type: "null"
                required:
                  - taskSettings
                  - stopCoderWorkspaceOnArchive
                  - runtimeEnablement
                  - defaultRuntime
                  - agentAiDefaults
                  - subagentAiDefaults
                  - muxGovernorUrl
                  - muxGovernorEnrolled
                  - llmDebugLogs
  /config/onConfigChanged:
    post:
      operationId: config.onConfigChanged
      requestBody:
        required: false
        content:
          application/json:
            schema:
              not: {}
      responses:
        "200":
          description: OK
          content:
            text/event-stream:
              schema:
                oneOf:
                  - type: object
                    properties:
                      event:
                        const: message
                      data:
                        not: {}
                      id:
                        type: string
                      retry:
                        type: number
                    required:
                      - event
                  - type: object
                    properties:
                      event:
                        const: done
                      data: {}
                      id:
                        type: string
                      retry:
                        type: number
                    required:
                      - event
                  - type: object
                    properties:
                      event:
                        const: error
                      data: {}
                      id:
                        type: string
                      retry:
                        type: number
                    required:
                      - event
