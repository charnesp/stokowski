                projects:
                  type: array
                  minItems: 2
                  items:
                    type: object
                    properties:
                      projectPath:
                        type: string
                        description: Absolute path to the project's main git repo
                      projectName:
                        type: string
                        description: Display name for the project (typically derived from projectPath)
                    required:
                      - projectPath
                      - projectName
                branchName:
                  type: string
                trunkBranch:
                  type: string
                title:
                  type: string
                runtimeConfig:
                  anyOf:
                    - type: object
                      properties:
                        type:
                          const: local
                        srcBaseDir:
                          type: string
                          description: Base directory where all workspaces are stored (legacy worktree
                            config)
                        bgOutputDir:
                          type: string
                          description: Directory for background process output (e.g., /tmp/mux-bashes)
                      required:
                        - type
                        - srcBaseDir
                    - type: object
                      properties:
                        type:
                          const: local
                        bgOutputDir:
                          type: string
                          description: Directory for background process output (e.g., /tmp/mux-bashes)
                      required:
                        - type
                    - type: object
                      properties:
                        type:
                          const: worktree
                        srcBaseDir:
                          type: string
                          description: Base directory where all workspaces are stored (e.g., ~/.mux/src)
                        bgOutputDir:
                          type: string
                          description: Directory for background process output (e.g., /tmp/mux-bashes)
                      required:
                        - type
                        - srcBaseDir
                    - type: object
                      properties:
                        type:
                          const: ssh
                        host:
                          type: string
                          description: SSH host (can be hostname, user@host, or SSH config alias)
                        srcBaseDir:
                          type: string
                          description: Base directory on remote host where all workspaces are stored
                        bgOutputDir:
                          type: string
                          description: Directory for background process output (e.g., /tmp/mux-bashes)
                        identityFile:
                          type: string
                          description: Path to SSH private key (if not using ~/.ssh/config or ssh-agent)
                        port:
                          type: number
                          description: "SSH port (default: 22)"
                        coder:
                          type: object
                          properties:
                            workspaceName:
                              type: string
                              description: Coder workspace name
                            template:
                              type: string
                              description: Template used to create workspace
                            templateOrg:
                              type: string
                              description: Template organization (for disambiguation when templates have same
                                name)
                            preset:
                              type: string
                              description: Preset used during creation
                            existingWorkspace:
                              type: boolean
                              description: True if connected to pre-existing Coder workspace
                          description: Coder workspace configuration (when using Coder as SSH backend)
                      required:
                        - type
                        - host
                        - srcBaseDir
                    - type: object
                      properties:
                        type:
                          const: docker
                        image:
                          type: string
                          description: Docker image to use (e.g., node:20)
                        containerName:
                          type: string
                          description: Container name (populated after workspace creation)
                        shareCredentials:
                          type: boolean
                          description: Forward SSH agent and mount ~/.gitconfig read-only
                      required:
                        - type
                        - image
                    - type: object
                      properties:
                        type:
                          const: devcontainer
                        configPath:
                          type: string
                          description: Path to devcontainer.json (relative to project root)
                        shareCredentials:
                          type: boolean
                          description: Forward SSH agent and mount ~/.gitconfig read-only
                      required:
                        - type
                        - configPath
              required:
                - projects
                - branchName
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Stable unique identifier (10 hex chars for new workspaces, legacy
                      format for old)
                  name:
                    type: string
                    description: Git branch / directory name (e.g., "plan-a1b2") - used for path
                      computation
                  title:
                    type: string
                    description: Human-readable workspace title (e.g., "Fix plan mode over SSH") -
                      optional for legacy workspaces
                  pendingAutoTitle:
                    type: boolean
                    description: True when a forked workspace is waiting to generate a title from
                      its first accepted continue message.
                  forkFamilyBaseName:
                    type: string
                    description: Stable base workspace name used to continue auto-generated fork
                      numbering without relying on title heuristics.
                  projectName:
                    type: string
                    description: Project name extracted from project path (for display)
                  projectPath:
                    type: string
                    description: Absolute path to the project (needed to compute workspace path)
                  createdAt:
                    type: string
                    description: ISO 8601 timestamp of when workspace was created (optional for
                      backward compatibility)
                  aiSettingsByAgent:
                    type: object
                    propertyNames:
                      type: string
                      minLength: 1
                    additionalProperties:
                      type: object
                      properties:
                        model:
                          type: string
                          description: Canonical model id in the form "provider:model"
                        thinkingLevel:
                          enum:
                            - off
                            - low
                            - medium
                            - high
                            - xhigh
                            - max
                          description: Thinking/reasoning effort level
                      required:
                        - model
                        - thinkingLevel
                    description: Per-agent AI settings persisted in config
                  runtimeConfig:
                    anyOf:
                      - type: object
                        properties:
                          type:
                            const: local
                          srcBaseDir:
                            type: string
                            description: Base directory where all workspaces are stored (legacy worktree
                              config)
                          bgOutputDir:
                            type: string
                            description: Directory for background process output (e.g., /tmp/mux-bashes)
                        required:
                          - type
                          - srcBaseDir
                      - type: object
                        properties:
                          type:
                            const: local
                          bgOutputDir:
                            type: string
                            description: Directory for background process output (e.g., /tmp/mux-bashes)
                        required:
                          - type
                      - type: object
                        properties:
                          type:
                            const: worktree
                          srcBaseDir:
                            type: string
                            description: Base directory where all workspaces are stored (e.g., ~/.mux/src)
                          bgOutputDir:
                            type: string
                            description: Directory for background process output (e.g., /tmp/mux-bashes)
                        required:
                          - type
                          - srcBaseDir
                      - type: object
                        properties:
                          type:
                            const: ssh
                          host:
                            type: string
                            description: SSH host (can be hostname, user@host, or SSH config alias)
                          srcBaseDir:
                            type: string
                            description: Base directory on remote host where all workspaces are stored
                          bgOutputDir:
                            type: string
                            description: Directory for background process output (e.g., /tmp/mux-bashes)
                          identityFile:
                            type: string
                            description: Path to SSH private key (if not using ~/.ssh/config or ssh-agent)
                          port:
                            type: number
                            description: "SSH port (default: 22)"
                          coder:
                            type: object
                            properties:
                              workspaceName:
                                type: string
                                description: Coder workspace name
                              template:
                                type: string
                                description: Template used to create workspace
                              templateOrg:
                                type: string
                                description: Template organization (for disambiguation when templates have same
                                  name)
                              preset:
                                type: string
                                description: Preset used during creation
                              existingWorkspace:
                                type: boolean
                                description: True if connected to pre-existing Coder workspace
                            description: Coder workspace configuration (when using Coder as SSH backend)
                        required:
                          - type
                          - host
                          - srcBaseDir
                      - type: object
                        properties:
                          type:
                            const: docker
                          image:
                            type: string
                            description: Docker image to use (e.g., node:20)
                          containerName:
                            type: string
                            description: Container name (populated after workspace creation)
                          shareCredentials:
                            type: boolean
                            description: Forward SSH agent and mount ~/.gitconfig read-only
                        required:
                          - type
                          - image
                      - type: object
                        properties:
                          type:
                            const: devcontainer
                          configPath:
                            type: string
                            description: Path to devcontainer.json (relative to project root)
                          shareCredentials:
                            type: boolean
                            description: Forward SSH agent and mount ~/.gitconfig read-only
                        required:
                          - type
                          - configPath
                    description: Runtime configuration for this workspace (always set, defaults to
                      local on load)
                  aiSettings:
                    type: object
                    properties:
                      model:
                        type: string
                        description: Canonical model id in the form "provider:model"
                      thinkingLevel:
                        enum:
                          - off
                          - low
                          - medium
                          - high
                          - xhigh
                          - max
                        description: Thinking/reasoning effort level
                    required:
                      - model
                      - thinkingLevel
                    description: Workspace-scoped AI settings (model + thinking level) persisted in
                      config
                  parentWorkspaceId:
                    type: string
                    description: If set, this workspace is a child workspace spawned from the parent
                      workspaceId (enables nesting in UI and backend
                      orchestration).
                  agentType:
                    type: string
                    description: If set, selects an agent preset for this workspace (e.g., "explore"
                      or "exec").
                  agentId:
                    type: string
                    description: If set, selects an agent definition for this workspace (e.g.,
                      "explore" or "exec").
                  bestOf:
                    type: object
                    properties:
                      groupId:
                        type: string
                        description: Stable identifier shared by sibling task workspaces spawned from
                          the same grouped task request.
                      index:
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                        description: Zero-based sibling index within the grouped task request.
                      total:
                        type: integer
                        minimum: 2
                        maximum: 9007199254740991
                        description: Total number of sibling tasks spawned in the grouped task request.
                      kind:
                        enum:
                          - bestOf
                          - variants
                        description: Optional grouped task mode ("bestOf" for repeated candidates or
                          "variants" for labeled siblings). Missing values
                          default to "bestOf" at read time for backward
                          compatibility.
                      label:
                        type: string
                        minLength: 1
                        description: Optional per-sibling label for grouped task variants.
                    required:
                      - groupId
                      - index
                      - total
                    description: Grouping metadata for child tasks spawned from the same parent tool
                      call.
                  taskStatus:
                    enum:
                      - queued
                      - running
                      - awaiting_report
                      - interrupted
                      - reported
                    description: Agent task lifecycle status for child workspaces
                      (queued|running|awaiting_report|interrupted|reported).
                  reportedAt:
                    type: string
                    description: ISO 8601 timestamp for when an agent task reported completion
                      (optional).
                  taskModelString:
                    type: string
                    description: Model string used to run this agent task (used for restart-safe
                      resumptions).
                  taskThinkingLevel:
                    enum:
                      - off
                      - low
                      - medium
                      - high
                      - xhigh
                      - max
                    description: Thinking level used for this agent task (used for restart-safe
                      resumptions).
                  taskPrompt:
                    type: string
                    description: Initial prompt for a queued agent task (persisted only until the
                      task actually starts).
                  taskBaseCommitSha:
                    type: string
                    description: Git commit SHA this agent task workspace started from (used for
                      generating git-format-patch artifacts).
                  taskBaseCommitShaByProjectPath:
                    type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: string
                    description: Per-project git HEAD SHAs captured when an agent task workspace
                      starts (used for multi-project git-format-patch
                      artifacts).
                  taskTrunkBranch:
                    type: string
                    description: Trunk branch used to create/init this agent task workspace (used
                      for restart-safe init on queued tasks).
                  archivedAt:
                    type: string
                    description: ISO 8601 timestamp when workspace was last archived. Workspace is
                      considered archived if archivedAt > unarchivedAt (or
                      unarchivedAt is absent).
                  unarchivedAt:
                    type: string
                    description: ISO 8601 timestamp when workspace was last unarchived. Used for
                      recency calculation to bump restored workspaces to top.
                  projects:
                    type: array
                    items:
                      type: object
                      properties:
                        projectPath:
                          type: string
                          description: Absolute path to the project's main git repo
                        projectName:
                          type: string
                          description: Display name for the project (typically derived from projectPath)
                      required:
                        - projectPath
                        - projectName
                    description: "For multi-project workspaces: list of included projects. When >1
                      entry, this is a multi-project workspace.
                      projectPath/projectName reflect the primary project for
                      backcompat."
                  sectionId:
                    type: string
                    description: ID of the section this workspace belongs to (optional, unsectioned
                      if absent)
                  namedWorkspacePath:
                    type: string
                    description: Worktree path (uses workspace name as directory)
                  incompatibleRuntime:
                    type: string
                    description: If set, this workspace has an incompatible runtime configuration
                      (e.g., from a newer version of mux). The workspace should
                      be displayed but interactions should show this error
                      message.
                  isRemoving:
                    type: boolean
                    description: True if this workspace is currently being deleted (deletion in
                      progress).
                  isInitializing:
                    type: boolean
                    description: True if this workspace is currently initializing (postCreateSetup
                      or initWorkspace running).
                required:
                  - id
                  - name
                  - projectName
                  - projectPath
                  - runtimeConfig
                  - namedWorkspacePath
